<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Dashboard — RetailPro</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&family=Sora:wght@400;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/css/style.css" />
</head>
<body>

<div class="app-layout">
  <aside class="sidebar" id="sidebar"></aside>
  <div class="main-content">
    <div class="topbar" id="topbar"></div>
    <div class="page-content">

      <!-- Stats Grid -->
      <div class="stats-grid" id="statsGrid">
        <div class="stat-card"><div class="stat-icon" style="background:#DBEAFE;font-size:20px">📦</div><div><div class="stat-value">—</div><div class="stat-label">Total Products</div></div></div>
        <div class="stat-card"><div class="stat-icon" style="background:#D1FAE5;font-size:20px">💰</div><div><div class="stat-value">—</div><div class="stat-label">Total Revenue</div></div></div>
        <div class="stat-card"><div class="stat-icon" style="background:#FEE2E2;font-size:20px">⚠️</div><div><div class="stat-value">—</div><div class="stat-label">Low Stock Items</div></div></div>
        <div class="stat-card"><div class="stat-icon" style="background:#EDE9FE;font-size:20px">🧾</div><div><div class="stat-value">—</div><div class="stat-label">GST Collected</div></div></div>
        <div class="stat-card"><div class="stat-icon" style="background:#FEF3C7;font-size:20px">👥</div><div><div class="stat-value">—</div><div class="stat-label">Customers</div></div></div>
        <div class="stat-card"><div class="stat-icon" style="background:#FCE7F3;font-size:20px">🏪</div><div><div class="stat-value">—</div><div class="stat-label">Stock Value</div></div></div>
        <div class="stat-card"><div class="stat-icon" style="background:#ECFDF5;font-size:20px">🛒</div><div><div class="stat-value">—</div><div class="stat-label">Total Sales</div></div></div>
        <div class="stat-card"><div class="stat-icon" style="background:#F0F9FF;font-size:20px">🤝</div><div><div class="stat-value">—</div><div class="stat-label">Suppliers</div></div></div>
      </div>

      <div style="display:grid;grid-template-columns:1fr 1fr;gap:20px;margin-top:8px;">

        <!-- Top Products -->
        <div class="card">
          <div class="card-header">
            <div class="card-title">🏆 Top Selling Products</div>
          </div>
          <div id="topProductsContainer">
            <div style="text-align:center;padding:24px;color:#94A3B8">Loading...</div>
          </div>
        </div>

        <!-- Category Breakdown -->
        <div class="card">
          <div class="card-header">
            <div class="card-title">📂 Sales by Category</div>
          </div>
          <div id="categoryContainer">
            <div style="text-align:center;padding:24px;color:#94A3B8">Loading...</div>
          </div>
        </div>

      </div>

      <!-- Recent Sales -->
      <div class="card" style="margin-top:20px;">
        <div class="card-header">
          <div class="card-title">📋 Recent Sales</div>
          <a href="/pages/sales.html" class="btn btn-outline btn-sm">View All →</a>
        </div>
        <div class="table-wrapper">
          <table id="recentSalesTable">
            <thead>
              <tr>
                <th>#</th>
                <th>Product</th>
                <th>Qty</th>
                <th>Amount</th>
                <th>GST</th>
                <th>Total</th>
                <th>Date</th>
              </tr>
            </thead>
            <tbody id="recentSalesTbody">
              <tr><td colspan="7" style="text-align:center;padding:24px;color:#94A3B8">Loading...</td></tr>
            </tbody>
          </table>
        </div>
      </div>

    </div>
  </div>
</div>

<script src="/js/app.js"></script>
<script>
const CATEGORY_COLORS = ['#2563EB','#10B981','#F59E0B','#EF4444','#6366F1','#EC4899','#14B8A6','#F97316'];

(async () => {
  const user = await checkAuth();
  if (!user) return;

  document.getElementById('sidebar').innerHTML = buildSidebar(user, 'dashboard');
  document.getElementById('topbar').innerHTML = buildTopbar('📊 Dashboard');

  // Load summary
  const summary = await api('/api/dashboard/summary');
  if (summary?.success) {
    const d = summary.data;
    const stats = [
      { value: d.totalProducts?.count || 0, label: 'Total Products', icon: '📦', bg: '#DBEAFE' },
      { value: formatCurrency(d.totalSales?.revenue), label: 'Total Revenue', icon: '💰', bg: '#D1FAE5' },
      { value: d.lowStock?.count || 0, label: 'Low Stock Items', icon: '⚠️', bg: '#FEE2E2' },
      { value: formatCurrency(d.totalGST?.total), label: 'GST Collected', icon: '🧾', bg: '#EDE9FE' },
      { value: d.totalCustomers?.count || 0, label: 'Customers', icon: '👥', bg: '#FEF3C7' },
      { value: formatCurrency(d.stockValue?.value), label: 'Stock Value', icon: '🏪', bg: '#FCE7F3' },
      { value: d.totalSales?.count || 0, label: 'Total Sales', icon: '🛒', bg: '#ECFDF5' },
      { value: d.totalSuppliers?.count || 0, label: 'Suppliers', icon: '🤝', bg: '#F0F9FF' },
    ];

    document.getElementById('statsGrid').innerHTML = stats.map(s => `
      <div class="stat-card">
        <div class="stat-icon" style="background:${s.bg}">${s.icon}</div>
        <div>
          <div class="stat-value">${s.value}</div>
          <div class="stat-label">${s.label}</div>
        </div>
      </div>
    `).join('');
  }

  // Top products
  const topProds = await api('/api/dashboard/top-products');
  if (topProds?.success) {
    const max = topProds.data[0]?.total_qty || 1;
    document.getElementById('topProductsContainer').innerHTML = topProds.data.slice(0, 8).map((p, i) => `
      <div style="display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:1px solid #F1F5F9;">
        <div style="width:22px;height:22px;background:${CATEGORY_COLORS[i%CATEGORY_COLORS.length]};border-radius:50%;display:flex;align-items:center;justify-content:center;color:white;font-size:11px;font-weight:700;flex-shrink:0">${i+1}</div>
        <div style="flex:1;min-width:0">
          <div style="font-size:13px;font-weight:600;color:#0F172A;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${p.name}</div>
          <div style="height:5px;background:#F1F5F9;border-radius:3px;margin-top:4px">
            <div style="height:100%;width:${(p.total_qty/max*100).toFixed(0)}%;background:${CATEGORY_COLORS[i%CATEGORY_COLORS.length]};border-radius:3px"></div>
          </div>
        </div>
        <div style="text-align:right;flex-shrink:0">
          <div style="font-size:12px;font-weight:700;color:#0F172A">${p.total_qty} units</div>
          <div style="font-size:11px;color:#94A3B8">${formatCurrency(p.total_revenue)}</div>
        </div>
      </div>
    `).join('');
  }

  // Category sales
  const catSales = await api('/api/dashboard/category-sales');
  if (catSales?.success) {
    const total = catSales.data.reduce((s, c) => s + Number(c.total_revenue), 0);
    document.getElementById('categoryContainer').innerHTML = catSales.data.map((c, i) => {
      const pct = total > 0 ? (c.total_revenue / total * 100).toFixed(1) : 0;
      return `
        <div style="display:flex;align-items:center;gap:12px;padding:9px 0;border-bottom:1px solid #F1F5F9">
          <div style="width:10px;height:10px;border-radius:2px;background:${CATEGORY_COLORS[i%CATEGORY_COLORS.length]};flex-shrink:0"></div>
          <div style="flex:1">
            <div style="display:flex;justify-content:space-between;margin-bottom:4px">
              <span style="font-size:13px;font-weight:600;color:#0F172A">${c.category}</span>
              <span style="font-size:12px;color:#475569">${formatCurrency(c.total_revenue)}</span>
            </div>
            <div style="height:5px;background:#F1F5F9;border-radius:3px">
              <div style="height:100%;width:${pct}%;background:${CATEGORY_COLORS[i%CATEGORY_COLORS.length]};border-radius:3px"></div>
            </div>
          </div>
          <div style="font-size:12px;font-weight:700;color:#2563EB;width:40px;text-align:right">${pct}%</div>
        </div>
      `;
    }).join('');
  }

  // Recent sales
  const sales = await api('/api/sales');
  if (sales?.success) {
    const recent = sales.data.slice(0, 10);
    document.getElementById('recentSalesTbody').innerHTML = recent.map(s => `
      <tr>
        <td><span style="color:#94A3B8;font-size:12px">#${s.sale_id}</span></td>
        <td><strong>${s.product_name}</strong></td>
        <td>${s.quantity}</td>
        <td>${formatCurrency(s.subtotal)}</td>
        <td><span class="badge badge-warning">${s.gst_rate}%</span></td>
        <td><strong style="color:#10B981">${formatCurrency(s.total)}</strong></td>
        <td><span style="color:#64748B">${formatDate(s.date)}</span></td>
      </tr>
    `).join('');
  }

})();
</script>
</body>
</html>
