<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" /><meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Suppliers — RetailPro</title>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&family=Sora:wght@400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/css/style.css" />
</head>
<body>
<div class="app-layout">
  <aside class="sidebar" id="sidebar"></aside>
  <div class="main-content">
    <div class="topbar" id="topbar"></div>
    <div class="page-content">
      <div class="page-header">
        <div>
          <div class="page-title">🤝 Suppliers</div>
          <div class="page-subtitle">Manage supplier contacts (Admin only)</div>
        </div>
        <div style="display:flex;gap:10px">
          <div class="search-box">
            <span class="search-icon">🔍</span>
            <input class="search-input" type="text" id="searchInput" placeholder="Search suppliers..." oninput="filterTable('searchInput','suppliersTable')">
          </div>
          <button class="btn btn-primary" onclick="openModal('addModal')">+ Add Supplier</button>
        </div>
      </div>

      <div class="card" style="padding:0">
        <div class="table-wrapper">
          <table id="suppliersTable">
            <thead>
              <tr><th>#</th><th>Name</th><th>Contact</th><th>Actions</th></tr>
            </thead>
            <tbody id="suppliersTbody">
              <tr><td colspan="4" style="text-align:center;padding:32px;color:#94A3B8">Loading...</td></tr>
            </tbody>
          </table>
        </div>
      </div>
    </div>
  </div>
</div>

<!-- Add Modal -->
<div class="modal-overlay" id="addModal">
  <div class="modal">
    <div class="modal-header">
      <div class="modal-title">Add New Supplier</div>
      <button class="modal-close" onclick="closeModal('addModal')">✕</button>
    </div>
    <div class="modal-body">
      <div class="form-group">
        <label class="form-label">Supplier Name</label>
        <input class="form-control" id="addName" placeholder="Supplier name" />
      </div>
      <div class="form-group">
        <label class="form-label">Contact Number</label>
        <input class="form-control" id="addContact" placeholder="10-digit mobile" maxlength="10" />
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-outline" onclick="closeModal('addModal')">Cancel</button>
      <button class="btn btn-primary" onclick="addSupplier()">Add Supplier</button>
    </div>
  </div>
</div>

<!-- Edit Modal -->
<div class="modal-overlay" id="editModal">
  <div class="modal">
    <div class="modal-header">
      <div class="modal-title">Edit Supplier</div>
      <button class="modal-close" onclick="closeModal('editModal')">✕</button>
    </div>
    <div class="modal-body">
      <input type="hidden" id="editId" />
      <div class="form-group">
        <label class="form-label">Supplier Name</label>
        <input class="form-control" id="editName" />
      </div>
      <div class="form-group">
        <label class="form-label">Contact Number</label>
        <input class="form-control" id="editContact" />
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-outline" onclick="closeModal('editModal')">Cancel</button>
      <button class="btn btn-primary" onclick="updateSupplier()">Save Changes</button>
    </div>
  </div>
</div>

<script src="/js/app.js"></script>
<script>
(async () => {
  const user = await checkAuth();
  if (!user) return;
  if (user.role !== 'admin') { window.location.href = '/pages/dashboard.html'; return; }
  document.getElementById('sidebar').innerHTML = buildSidebar(user, 'suppliers');
  document.getElementById('topbar').innerHTML = buildTopbar('🤝 Suppliers');
  loadSuppliers();
})();

async function loadSuppliers() {
  const res = await api('/api/suppliers');
  if (!res?.success) return;
  const tbody = document.getElementById('suppliersTbody');
  tbody.innerHTML = res.data.map(s => `
    <tr>
      <td><span style="color:#94A3B8;font-size:12px">${s.supplier_id}</span></td>
      <td>
        <div style="display:flex;align-items:center;gap:8px">
          <div style="width:30px;height:30px;border-radius:50%;background:linear-gradient(135deg,#10B981,#059669);display:flex;align-items:center;justify-content:center;color:white;font-weight:700;font-size:12px">${s.name.charAt(0)}</div>
          <strong>${s.name}</strong>
        </div>
      </td>
      <td>📞 ${s.contact || '—'}</td>
      <td>
        <div style="display:flex;gap:6px">
          <button class="btn btn-outline btn-sm" onclick="editSupplier(${s.supplier_id},'${s.name.replace(/'/g,"\\'")}','${s.contact||''}')">✏️ Edit</button>
          <button class="btn btn-danger btn-sm" onclick="deleteSupplier(${s.supplier_id})">🗑️</button>
        </div>
      </td>
    </tr>
  `).join('');
}

async function addSupplier() {
  const name = document.getElementById('addName').value.trim();
  const contact = document.getElementById('addContact').value.trim();
  if (!name) { showToast('Name is required', 'error'); return; }
  const res = await api('/api/suppliers', 'POST', { name, contact });
  if (res?.success) { showToast('Supplier added!'); closeModal('addModal'); loadSuppliers(); }
  else showToast(res?.message || 'Error', 'error');
}

function editSupplier(id, name, contact) {
  document.getElementById('editId').value = id;
  document.getElementById('editName').value = name;
  document.getElementById('editContact').value = contact;
  openModal('editModal');
}

async function updateSupplier() {
  const id = document.getElementById('editId').value;
  const name = document.getElementById('editName').value.trim();
  const contact = document.getElementById('editContact').value.trim();
  const res = await api(`/api/suppliers/${id}`, 'PUT', { name, contact });
  if (res?.success) { showToast('Supplier updated!'); closeModal('editModal'); loadSuppliers(); }
  else showToast(res?.message || 'Error', 'error');
}

async function deleteSupplier(id) {
  if (!confirm('Delete this supplier?')) return;
  const res = await api(`/api/suppliers/${id}`, 'DELETE');
  if (res?.success) { showToast('Supplier deleted'); loadSuppliers(); }
  else showToast(res?.message || 'Error', 'error');
}
</script>
</body>
</html>
